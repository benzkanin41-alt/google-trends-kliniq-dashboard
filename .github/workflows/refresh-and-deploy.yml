name: Refresh and deploy dashboard

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 14:00 Asia/Bangkok = 07:00 UTC.
    - cron: "0 7 * * 1"

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ALLOW_STALE_ON_FETCH_FAILURE: "1"

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Refresh Google Trends data
        run: python scripts/fetch_and_build_dashboard.py

      - name: Validate generated outputs
        run: python scripts/check_outputs.py

      - name: Persist fresh scheduled outputs
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        run: |
          if grep -q 'Refresh status: `fresh`' outputs/validation_report.md; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add outputs
            if git diff --cached --quiet; then
              echo "No refreshed output changes to commit."
            else
              git commit -m "Refresh Google Trends dashboard data [skip ci]"
              git push
            fi
          else
            echo "Skipping output commit because Google Trends refresh used fallback."
            grep "Refresh status" outputs/validation_report.md || true
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: outputs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
